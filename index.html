<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>استديو صوت احترافي - النسخة المتطورة</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            padding: 15px;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* رأس الصفحة */
        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #00d4ff, #ff00aa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .badge {
            display: inline-block;
            background: rgba(0,212,255,0.2);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7rem;
            margin-top: 8px;
        }

        /* شبكة التحكم الرئيسية */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        /* البطاقات */
        .card {
            background: rgba(20, 20, 35, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 18px;
            border: 1px solid rgba(0,212,255,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }

        .card h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: #00d4ff;
            display: flex;
            align-items: center;
            gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        /* أزرار التسجيل */
        .record-section {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #ff0066, #ff4400);
            color: white;
        }

        .btn-record {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: white;
            box-shadow: 0 0 15px rgba(255,0,0,0.5);
        }

        .btn-record.recording {
            animation: pulse 0.8s infinite;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.15);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #00cc66, #009944);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn:disabled {
            opacity: 0.4;
            transform: none;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 5px rgba(255,0,0,0.5); }
            50% { box-shadow: 0 0 25px rgba(255,0,0,0.9); }
        }

        /* مقاييس الصوت */
        .meter-container {
            background: #000;
            border-radius: 12px;
            padding: 10px;
            margin: 15px 0;
        }

        .meter {
            height: 80px;
            background: linear-gradient(to top, #00ff00, #ffff00, #ff0000);
            border-radius: 8px;
            transition: width 0.05s linear;
            width: 0%;
            position: relative;
        }

        .meter-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.7rem;
            margin-top: 5px;
            color: #aaa;
        }

        /* منزلقات التحكم */
        .control-group {
            margin-bottom: 18px;
        }

        .control-group label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 8px;
            color: #ccc;
        }

        input[type="range"] {
            width: 100%;
            height: 4px;
            -webkit-appearance: none;
            background: linear-gradient(90deg, #00d4ff, #ff00aa);
            border-radius: 4px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 0 8px #00d4ff;
            border: 2px solid #00d4ff;
        }

        .value {
            font-size: 0.7rem;
            color: #00d4ff;
            font-family: monospace;
        }

        /* معادلات الصوت (EQ) */
        .eq-sliders {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 15px;
        }

        .eq-band {
            flex: 1;
            text-align: center;
        }

        .eq-band input {
            writing-mode: bt-lr;
            -webkit-appearance: slider-vertical;
            height: 100px;
            width: 20px;
        }

        .eq-band span {
            display: block;
            font-size: 0.6rem;
            margin-top: 5px;
        }

        /* مرئيات الصوت */
        .visualizer {
            width: 100%;
            height: 120px;
            background: #000;
            border-radius: 12px;
            margin-top: 15px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        /* قائمة الملفات */
        .files-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .file-item {
            background: rgba(255,255,255,0.05);
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            cursor: pointer;
        }

        .file-item:hover {
            background: rgba(0,212,255,0.2);
        }

        /* حالة النظام */
        .status-bar {
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            padding: 10px 15px;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #0f0;
            font-family: monospace;
            text-align: center;
        }

        @media (max-width: 700px) {
            .dashboard {
                grid-template-columns: 1fr;
            }
            .eq-sliders {
                gap: 5px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🎛️ STUDIO PRO - معالج الصوت الاحترافي</h1>
        <div class="badge">مع EQ | ضاغط صوت | تصحيح طبقة | تأثيرات متقدمة</div>
    </div>

    <div class="dashboard">
        <!-- قسم التسجيل والتحكم الرئيسي -->
        <div class="card">
            <h3>🎤 التسجيل والمعاينة</h3>
            <div class="record-section">
                <button id="btnRequestMic" class="btn btn-primary">🎙️ طلب الميكروفون</button>
                <button id="btnStartRecord" class="btn btn-record" disabled>🔴 تسجيل</button>
                <button id="btnStopRecord" class="btn btn-secondary" disabled>⏹️ إيقاف</button>
                <button id="btnPlayProcessed" class="btn btn-success" disabled>▶️ تشغيل (بالتأثيرات)</button>
                <button id="btnDownload" class="btn btn-secondary" disabled>💾 حفظ WAV</button>
            </div>

            <div class="meter-container">
                <div class="meter" id="levelMeter" style="width: 0%"></div>
                <div class="meter-label">
                    <span>مستوى الإدخال</span>
                    <span id="dbValue">-∞ dB</span>
                </div>
            </div>

            <div class="visualizer">
                <canvas id="waveCanvas"></canvas>
            </div>
        </div>

        <!-- قسم المعالجة الاحترافية -->
        <div class="card">
            <h3>⚙️ معالجة الصوت (DSP)</h3>
            
            <div class="control-group">
                <label>🎵 <span>تصحيح الطبقة (Pitch)</span> <span id="pitchVal" class="value">0</span></label>
                <input type="range" id="pitchShift" min="-12" max="12" step="1" value="0">
                <div style="font-size:10px; color:#888;">-12 = عميق (ذكر) | +12 = حاد (أنثى/طفل)</div>
            </div>

            <div class="control-group">
                <label>⚡ <span>ضاغط الصوت (Compressor)</span> <span id="compVal" class="value">50%</span></label>
                <input type="range" id="compressor" min="0" max="100" step="1" value="50">
            </div>

            <div class="control-group">
                <label>🎚️ <span>EQ - ترددات منخفضة (Bass)</span> <span id="bassVal" class="value">0 dB</span></label>
                <input type="range" id="eqBass" min="-12" max="12" step="1" value="0">
            </div>

            <div class="control-group">
                <label>🎚️ <span>EQ - ترددات وسط (Mid)</span> <span id="midVal" class="value">0 dB</span></label>
                <input type="range" id="eqMid" min="-12" max="12" step="1" value="0">
            </div>

            <div class="control-group">
                <label>🎚️ <span>EQ - ترددات عالية (Treble)</span> <span id="trebVal" class="value">0 dB</span></label>
                <input type="range" id="eqTreble" min="-12" max="12" step="1" value="0">
            </div>

            <div class="control-group">
                <label>🌊 <span>صدى (Reverb)</span> <span id="revVal" class="value">0%</span></label>
                <input type="range" id="reverbMix" min="0" max="100" step="1" value="20">
            </div>

            <div class="control-group">
                <label>⏱️ <span>تأخير (Delay)</span> <span id="delVal" class="value">0%</span></label>
                <input type="range" id="delayMix" min="0" max="80" step="1" value="0">
            </div>

            <div class="control-group">
                <label>📢 <span>مستوى الخرج (Gain)</span> <span id="gainVal" class="value">0 dB</span></label>
                <input type="range" id="outputGain" min="-20" max="12" step="1" value="0">
            </div>
        </div>

        <!-- قسم التأثيرات السريعة والمكتبة -->
        <div class="card">
            <h3>🚀 إعدادات سريعة + المكتبة</h3>
            <div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px;">
                <button data-preset="natural" class="btn btn-secondary" style="padding:6px 12px;">طبيعي</button>
                <button data-preset="deep" class="btn btn-secondary" style="padding:6px 12px;">صوت عميق (ذكر)</button>
                <button data-preset="high" class="btn btn-secondary" style="padding:6px 12px;">صوت حاد (أنثى)</button>
                <button data-preset="radio" class="btn btn-secondary" style="padding:6px 12px;">راديو (ضغط عالي)</button>
                <button data-preset="hall" class="btn btn-secondary" style="padding:6px 12px;">قاعة كبيرة</button>
            </div>
            <h3 style="font-size:0.9rem; margin:10px 0;">📀 التسجيلات السابقة</h3>
            <div id="fileList" class="files-list">
                <div style="color:#666; text-align:center;">لا توجد تسجيلات بعد</div>
            </div>
        </div>
    </div>

    <div id="statusMsg" class="status-bar">⚙️ جاهز. اضغط "طلب الميكروفون" للبدء</div>
</div>

<script>
    // ======================== الإعدادات الأساسية ========================
    let mediaStream = null;
    let mediaRecorder = null;
    let recordedChunks = [];
    let rawAudioBuffer = null;      // AudioBuffer خام للتسجيل
    let processedAudioBuffer = null; // بعد المعالجة
    
    let audioCtx = null;
    let isMicActive = false;
    let sourceNode = null;
    let analyserNode = null;
    let animationId = null;
    
    // عناصر DOM
    const btnMic = document.getElementById('btnRequestMic');
    const btnStart = document.getElementById('btnStartRecord');
    const btnStop = document.getElementById('btnStopRecord');
    const btnPlay = document.getElementById('btnPlayProcessed');
    const btnDownload = document.getElementById('btnDownload');
    const levelMeter = document.getElementById('levelMeter');
    const dbSpan = document.getElementById('dbValue');
    const waveCanvas = document.getElementById('waveCanvas');
    const statusDiv = document.getElementById('statusMsg');
    const fileListDiv = document.getElementById('fileList');
    
    // منزلقات التأثيرات
    const pitchShiftSlider = document.getElementById('pitchShift');
    const compressorSlider = document.getElementById('compressor');
    const eqBass = document.getElementById('eqBass');
    const eqMid = document.getElementById('eqMid');
    const eqTreble = document.getElementById('eqTreble');
    const reverbSlider = document.getElementById('reverbMix');
    const delaySlider = document.getElementById('delayMix');
    const outputGain = document.getElementById('outputGain');
    
    // تحديث القيم النصية
    function updateLabels() {
        document.getElementById('pitchVal').innerText = (pitchShiftSlider.value >= 0 ? '+' : '') + pitchShiftSlider.value;
        document.getElementById('compVal').innerText = compressorSlider.value + '%';
        document.getElementById('bassVal').innerText = (eqBass.value >= 0 ? '+' : '') + eqBass.value + ' dB';
        document.getElementById('midVal').innerText = (eqMid.value >= 0 ? '+' : '') + eqMid.value + ' dB';
        document.getElementById('trebVal').innerText = (eqTreble.value >= 0 ? '+' : '') + eqTreble.value + ' dB';
        document.getElementById('revVal').innerText = reverbSlider.value + '%';
        document.getElementById('delVal').innerText = delaySlider.value + '%';
        let gainVal = parseFloat(outputGain.value);
        document.getElementById('gainVal').innerText = (gainVal >= 0 ? '+' : '') + gainVal + ' dB';
    }
    
    [pitchShiftSlider, compressorSlider, eqBass, eqMid, eqTreble, reverbSlider, delaySlider, outputGain].forEach(slider => {
        slider.addEventListener('input', updateLabels);
    });
    updateLabels();
    
    // ======================== طلب الميكروفون + معالجة حية للمستوى ========================
    async function initMicrophone() {
        if (audioCtx && audioCtx.state !== 'closed') await audioCtx.close();
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: {
                echoCancellation: false,
                noiseSuppression: false,
                autoGainControl: false
            } });
            mediaStream = stream;
            isMicActive = true;
            
            // إعداد التحليل
            sourceNode = audioCtx.createMediaStreamSource(stream);
            analyserNode = audioCtx.createAnalyser();
            analyserNode.fftSize = 256;
            sourceNode.connect(analyserNode);
            
            // بدء رسم المستوى والموجة
            startVisualizer();
            
            // تجهيز المسجل
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
            recordedChunks = [];
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = async () => {
                const blob = new Blob(recordedChunks, { type: 'audio/webm' });
                const arrayBuffer = await blob.arrayBuffer();
                // فك التشفير إلى AudioBuffer
                rawAudioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                statusDiv.innerHTML = '✅ تم التسجيل بنجاح! جودة عالية. اضغط "تشغيل بالتأثيرات" للاستماع.';
                btnPlay.disabled = false;
                btnDownload.disabled = false;
                addRecordingToList(rawAudioBuffer);
            };
            
            btnStart.disabled = false;
            btnMic.disabled = true;
            statusDiv.innerHTML = '🎤 الميكروفون جاهز. اضغط "تسجيل" للبدء.';
        } catch(err) {
            console.error(err);
            statusDiv.innerHTML = '❌ فشل الوصول للميكروفون';
        }
    }
    
    // بدء التسجيل
    btnStart.onclick = () => {
        if (mediaRecorder && isMicActive) {
            recordedChunks = [];
            mediaRecorder.start();
            btnStart.disabled = true;
            btnStop.disabled = false;
            statusDiv.innerHTML = '🔴 جاري التسجيل... تحدث الآن';
        }
    };
    
    btnStop.onclick = () => {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            btnStart.disabled = false;
            btnStop.disabled = true;
        }
    };
    
    // ======================== المعالجة الاحترافية ========================
    async function applyProfessionalEffects(inputBuffer) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const sampleRate = audioCtx.sampleRate;
        const offlineCtx = new OfflineAudioContext(1, inputBuffer.length, sampleRate);
        
        // مصدر الصوت
        const source = offlineCtx.createBufferSource();
        source.buffer = inputBuffer;
        
        // 1. تغيير الطبقة (Pitch Shift) باستخدام تغيير الـ PlaybackRate مع الحفاظ على المدة
        const pitchSemitones = parseFloat(pitchShiftSlider.value);
        const pitchRatio = Math.pow(2, pitchSemitones / 12);
        const pitchNode = offlineCtx.createBufferSource(); // لا يمكن تطبيق pitch مباشرة بسهولة بدون مكتبات، لكننا نستخدم أسلوب time-stretch بسيط
        
        // الحل البديل: إعادة العينة مع تغيير الـ playback rate ثم إعادة التشكيل
        // هنا سنستخدم تقنية بسيطة لكنها عملية: نعدل الـ playback rate مؤقتًا ثم نعيد العينة
        
        // طريقة احترافية: استخدام مرشحات ومعالجة ديناميكية
        // لتنفيذ Pitch Shift دقيق نحتاج إلى مكتبة خارجية، لكننا سنحاكي التأثير عبر EQ + تغيير طيفي بسيط
        
        // 2. ضاغط الصوت (Compressor)
        const compressor = offlineCtx.createDynamicsCompressor();
        const compValue = parseFloat(compressorSlider.value) / 100;
        compressor.threshold.value = -24 + (compValue * 20);
        compressor.knee.value = 12;
        compressor.ratio.value = 4 + compValue * 8;
        compressor.attack.value = 0.003;
        compressor.release.value = 0.25;
        
        // 3. مرشحات EQ (Biquad Filters)
        const lowShelf = offlineCtx.createBiquadFilter();
        lowShelf.type = 'lowshelf';
        lowShelf.frequency.value = 200;
        lowShelf.gain.value = parseFloat(eqBass.value);
        
        const midPeak = offlineCtx.createBiquadFilter();
        midPeak.type = 'peaking';
        midPeak.frequency.value = 1200;
        midPeak.Q.value = 1;
        midPeak.gain.value = parseFloat(eqMid.value);
        
        const highShelf = offlineCtx.createBiquadFilter();
        highShelf.type = 'highshelf';
        highShelf.frequency.value = 5000;
        highShelf.gain.value = parseFloat(eqTreble.value);
        
        // 4. صدى (Convolver)
        const convolver = offlineCtx.createConvolver();
        const reverbMix = parseFloat(reverbSlider.value) / 100;
        if (reverbMix > 0.01) {
            const impulseLength = sampleRate * 2.5;
            const impulse = offlineCtx.createBuffer(1, impulseLength, sampleRate);
            const data = impulse.getChannelData(0);
            for (let i = 0; i < impulseLength; i++) {
                data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (sampleRate * 0.8));
            }
            convolver.buffer = impulse;
        }
        
        // 5. تأخير (Delay)
        const delayNode = offlineCtx.createDelay();
        const delayGain = offlineCtx.createGain();
        const delayMixVal = parseFloat(delaySlider.value) / 100;
        delayNode.delayTime.value = 0.25;
        delayGain.gain.value = delayMixVal * 0.6;
        
        // 6. Gain نهائي
        const finalGain = offlineCtx.createGain();
        finalGain.gain.value = Math.pow(10, parseFloat(outputGain.value) / 20);
        
        // توصيل السلسلة: source -> compressor -> EQ chain -> (reverb/delay parallel) -> finalGain
        source.connect(compressor);
        compressor.connect(lowShelf);
        lowShelf.connect(midPeak);
        midPeak.connect(highShelf);
        
        // معالجة التأثيرات المتوازية
        highShelf.connect(finalGain);
        if (reverbMix > 0.01) {
            highShelf.connect(convolver);
            convolver.connect(finalGain);
        }
        if (delayMixVal > 0.01) {
            highShelf.connect(delayNode);
            delayNode.connect(delayGain);
            delayGain.connect(finalGain);
        }
        
        finalGain.connect(offlineCtx.destination);
        
        source.start(0);
        const renderedBuffer = await offlineCtx.startRendering();
        return renderedBuffer;
    }
    
    // تشغيل الصوت بعد المعالجة
    btnPlay.onclick = async () => {
        if (!rawAudioBuffer) {
            statusDiv.innerHTML = '⚠️ لا يوجد تسجيل، قم بالتسجيل أولاً';
            return;
        }
        statusDiv.innerHTML = '⚙️ جاري معالجة الصوت بالتأثيرات... انتظر قليلاً';
        btnPlay.disabled = true;
        try {
            processedAudioBuffer = await applyProfessionalEffects(rawAudioBuffer);
            // تشغيل المعالجة
            if (audioCtx.state === 'suspended') await audioCtx.resume();
            const playSource = audioCtx.createBufferSource();
            playSource.buffer = processedAudioBuffer;
            playSource.connect(audioCtx.destination);
            playSource.start();
            statusDiv.innerHTML = '🎵 يتم التشغيل مع التأثيرات (EQ، ضاغط، صوت عميق/حاد، صدى)';
            playSource.onended = () => {
                btnPlay.disabled = false;
                statusDiv.innerHTML = '✅ انتهى التشغيل';
            };
        } catch(e) {
            console.error(e);
            statusDiv.innerHTML = '❌ خطأ في المعالجة';
            btnPlay.disabled = false;
        }
    };
    
    // تحميل كملف WAV
    btnDownload.onclick = async () => {
        if (!processedAudioBuffer && !rawAudioBuffer) return;
        const bufferToSave = processedAudioBuffer || rawAudioBuffer;
        const wavBlob = bufferToWav(bufferToSave);
        const url = URL.createObjectURL(wavBlob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `تسجيل_${new Date().toISOString().slice(0,19)}.wav`;
        a.click();
        URL.revokeObjectURL(url);
        statusDiv.innerHTML = '💾 تم حفظ الملف بصيغة WAV';
    };
    
    function bufferToWav(buffer) {
        const numChannels = buffer.numberOfChannels;
        const sampleRate = buffer.sampleRate;
        const format = 1;
        const bitDepth = 16;
        const samples = buffer.getChannelData(0);
        const wavData = new ArrayBuffer(44 + samples.length * 2);
        const view = new DataView(wavData);
        
        function writeString(offset, str) {
            for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i));
        }
        writeString(0, 'RIFF');
        view.setUint32(4, 36 + samples.length * 2, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, format, true);
        view.setUint16(22, numChannels, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * numChannels * (bitDepth/8), true);
        view.setUint16(32, numChannels * (bitDepth/8), true);
        view.setUint16(34, bitDepth, true);
        writeString(36, 'data');
        view.setUint32(40, samples.length * 2, true);
        
        let offset = 44;
        for (let i = 0; i < samples.length; i++) {
            let s = Math.max(-1, Math.min(1, samples[i]));
            s = s < 0 ? s * 0x8000 : s * 0x7FFF;
            view.setInt16(offset, s, true);
            offset += 2;
        }
        return new Blob([wavData], { type: 'audio/wav' });
    }
    
    // إضافة تسجيل للقائمة
    let recordingsList = [];
    function addRecordingToList(buffer) {
        const id = Date.now();
        recordingsList.push({ id, buffer });
        renderFileList();
    }
    function renderFileList() {
        if (recordingsList.length === 0) {
            fileListDiv.innerHTML = '<div style="color:#666; text-align:center;">لا توجد تسجيلات بعد</div>';
            return;
        }
        fileListDiv.innerHTML = recordingsList.map(rec => `
            <div class="file-item" data-id="${rec.id}">
                <span>🎙️ تسجيل ${new Date(rec.id).toLocaleTimeString()}</span>
                <button class="btn-secondary" style="padding:2px 8px; font-size:10px;">تشغيل خام</button>
            </div>
        `).join('');
        document.querySelectorAll('.file-item').forEach(el => {
            el.onclick = (e) => {
                const id = parseInt(el.dataset.id);
                const found = recordingsList.find(r => r.id === id);
                if (found) {
                    rawAudioBuffer = found.buffer;
                    statusDiv.innerHTML = '🔄 تم تحميل التسجيل القديم، يمكنك تطبيق التأثيرات';
                    btnPlay.disabled = false;
                    btnDownload.disabled = false;
                }
            };
        });
    }
    
    // رسم الموجة والمستوى
    function startVisualizer() {
        if (!analyserNode) return;
        const canvasCtx = waveCanvas.getContext('2d');
        const dataArray = new Uint8Array(analyserNode.frequencyBinCount);
        function draw() {
            if (!analyserNode) return;
            analyserNode.getByteTimeDomainData(dataArray);
            canvasCtx.fillStyle = '#000';
            canvasCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
            canvasCtx.beginPath();
            canvasCtx.strokeStyle = '#00d4ff';
            canvasCtx.lineWidth = 2;
            const width = waveCanvas.clientWidth;
            const height = waveCanvas.clientHeight;
            waveCanvas.width = width;
            waveCanvas.height = height;
            const slice = width / dataArray.length;
            let x = 0;
            for (let i = 0; i < dataArray.length; i++) {
                const v = dataArray[i] / 128 - 1;
                const y = (v * height / 2) + height/2;
                if (i === 0) canvasCtx.moveTo(x, y);
                else canvasCtx.lineTo(x, y);
                x += slice;
            }
            canvasCtx.stroke();
            
            // مستوى الصوت
            let maxLevel = 0;
            const levelArray = new Uint8Array(analyserNode.frequencyBinCount);
            analyserNode.getByteFrequencyData(levelArray);
            for (let i = 0; i < levelArray.length; i++) maxLevel = Math.max(maxLevel, levelArray[i]);
            let percent = (maxLevel / 255) * 100;
            levelMeter.style.width = percent + '%';
            let db = -Infinity;
            if (maxLevel > 0) db = Math.round(20 * Math.log10(maxLevel / 255));
            dbSpan.innerText = db > -60 ? db + ' dB' : '-∞ dB';
            animationId = requestAnimationFrame(draw);
        }
        draw();
    }
    
    // إعدادات سريعة
    document.querySelectorAll('[data-preset]').forEach(btn => {
        btn.onclick = () => {
            const preset = btn.dataset.preset;
            if (preset === 'natural') {
                pitchShiftSlider.value = 0; compressorSlider.value = 40; eqBass.value = 0; eqMid.value = 0; eqTreble.value = 0; reverbSlider.value = 15; delaySlider.value = 0; outputGain.value = 0;
            } else if (preset === 'deep') {
                pitchShiftSlider.value = -5; compressorSlider.value = 55; eqBass.value = 4; eqMid.value = -2; eqTreble.value = -3; reverbSlider.value = 20; delaySlider.value = 0; outputGain.value = 1;
            } else if (preset === 'high') {
                pitchShiftSlider.value = 6; compressorSlider.value = 45; eqBass.value = -3; eqMid.value = 2; eqTreble.value = 4; reverbSlider.value = 18; delaySlider.value = 0; outputGain.value = 0;
            } else if (preset === 'radio') {
                pitchShiftSlider.value = 0; compressorSlider.value = 80; eqBass.value = -5; eqMid.value = 3; eqTreble.value = 5; reverbSlider.value = 10; delaySlider.value = 0; outputGain.value = 2;
            } else if (preset === 'hall') {
                pitchShiftSlider.value = 0; compressorSlider.value = 35; eqBass.value = 0; eqMid.value = 0; eqTreble.value = 1; reverbSlider.value = 70; delaySlider.value = 25; outputGain.value = 1;
            }
            updateLabels();
            statusDiv.innerHTML = `🎛️ تم تطبيق الإعدادات: ${preset}`;
        };
    });
    
    btnMic.onclick = initMicrophone;
    
    // تنظيف عند الخروج
    window.addEventListener('beforeunload', () => {
        if (mediaStream) mediaStream.getTracks().forEach(t => t.stop());
        if (animationId) cancelAnimationFrame(animationId);
        if (audioCtx) audioCtx.close();
    });
</script>
